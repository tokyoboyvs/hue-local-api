<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hue Local API UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>Hue Local API</h1>

        <label for="api-key">API Key</label>
        <input id="api-key" type="password" placeholder="Enter API key" />

        <label for="room-select">Select a room</label>
        <select id="room-select">
          <option value="">All rooms</option>
        </select>

        <label for="light-select">Select a light</label>
        <select id="light-select">
          <option value="">Loading lights...</option>
        </select>

        <button id="load-light-btn" type="button">Load light</button>
        <button id="refresh-ui-btn" type="button">Refresh</button>

        <div class="bulk-panel">
          <label for="bulk-light-select">Select multiple lights</label>
          <select id="bulk-light-select" multiple size="6"></select>

          <div class="actions">
            <button id="bulk-on-btn">Bulk on</button>
            <button id="bulk-off-btn">Bulk off</button>
            <button id="bulk-toggle-btn">Bulk toggle</button>
          </div>
        </div>

        <div id="status-card" class="status-card hidden">
          <h2>Light details</h2>
          <p>
            <strong>ID:</strong>
            <span id="light-id"></span>
          </p>
          <p>
            <strong>Name:</strong>
            <span id="light-name"></span>
          </p>
          <p>
            <strong>Room:</strong>
            <span id="light-room"></span>
          </p>
          <p>
            <strong>Power:</strong>
            <span id="light-power" class="power-badge"></span>
          </p>
          <p>
            <strong>Brightness:</strong>
            <span id="light-brightness"></span>
          </p>
          <p class="color-row">
            <strong>Color:</strong>
            <span id="light-color"></span>
            <span id="light-color-preview" class="color-preview"></span>
          </p>

          <div class="actions">
            <button id="turn-on-btn" type="button">Turn on</button>
            <button id="turn-off-btn" type="button">Turn off</button>
            <button id="toggle-btn" type="button">Toggle</button>
          </div>

          <div class="control-group">
            <label for="brightness-range">Brightness</label>
            <input id="brightness-range" type="range" min="0" max="100" value="50" />
            <span id="brightness-value">0%</span>
            <button id="apply-brightness-btn" type="button">Apply brightness</button>
          </div>

          <div class="control-group">
            <label for="color-picker">Color</label>
            <input id="color-picker" type="color" value="#ffffff" />
            <button id="apply-color-btn" type="button">Apply color</button>
          </div>
        </div>

        <p id="feedback" class="feedback feedback-neutral"></p>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
